Metadata:
	Title: mod-title
	Version: {DEV_VERSION}
	Hidden: true

FileSystem: DefaultFileSystem
	Packages:
		^EngineDir
		^EngineDir|mods/common-content: content
		^EngineDir|mods/common: common
		$modcontent: modcontent
		$openkrush_gen1: openkrush_gen1

Rules:
	content|rules.yaml

Cursors:
	content|cursors.yaml

Chrome:
	content|chrome.yaml

Assemblies: OpenRA.Mods.Common.dll, OpenRA.Mods.OpenKrush.dll

ChromeLayout:
	content|content.yaml

Notifications:
	content|notifications.yaml

LoadScreen: ModContentLoadScreen
	Image: ^EngineDir|mods/common-content/chrome.png
	Image2x: ^EngineDir|mods/common-content/chrome-2x.png
	Image3x: ^EngineDir|mods/common-content/chrome-3x.png

ChromeMetrics:
	common|metrics.yaml
	content|metrics.yaml

FluentMessages:
	common|fluent/common.ftl
	common|fluent/chrome.ftl
	common|fluent/hotkeys.ftl
	common|fluent/rules.ftl
	content|fluent/content.ftl
	content|fluent/chrome.ftl
	modcontent|fluent/chrome.ftl

Fonts:
	Tiny:
		Font: common|FreeSans.ttf
		Size: 10
		Ascender: 8
	TinyBold:
		Font: common|FreeSansBold.ttf
		Size: 10
		Ascender: 8
	Regular:
		Font: common|FreeSans.ttf
		Size: 14
		Ascender: 11
	Bold:
		Font: common|FreeSansBold.ttf
		Size: 14
		Ascender: 11
	MediumBold:
		Font: common|FreeSansBold.ttf
		Size: 18
		Ascender: 14
	BigBold:
		Font: common|FreeSansBold.ttf
		Size: 24
		Ascender: 18

ModContent:
	Mod: openkrush_gen1
	QuickDownload: demo
	Packages:
		ContentPackage@base:
			Title: modcontent-package-basefiles
			Identifier: base
			TestFiles: ^SupportDir|Content/openkrush_gen1/sprites.lvl
			Sources: gog, steam, kknd_english, xtreme_english
			Required: true
			Download: demo
		ContentPackage@kknd:
			Title: modcontent-package-kknd
			Identifier: kknd
			TestFiles: ^SupportDir|Content/openkrush_gen1/music/surv1.wav
			Sources: gog, steam, kknd_english, xtreme_english
		ContentPackage@xtreme:
			Title: modcontent-package-xtreme
			Identifier: xtreme
			TestFiles: ^SupportDir|Content/openkrush_gen1/music/surv4.wav
			Sources: gog, steam, xtreme_english
	Downloads:
		openkrush_gen1|installer/demo.yaml
	Sources:
		openkrush_gen1|installer/gog.yaml
		openkrush_gen1|installer/steam.yaml
		openkrush_gen1|installer/kknd_english.yaml
		openkrush_gen1|installer/xtreme_english.yaml

SoundFormats:

SpriteFormats: PngSheet

TerrainFormat: DefaultTerrain

SpriteSequenceFormat: DefaultSpriteSequence
