evolved_tower_machinegunnest:
	Inherits@muzzle: ^muzzle_16_directions
	# MGuardTower.mobd: finished base (frame 16) was authored one row “above” the make frames (17–19), so
	# idle/turret use a different Y than make0–2. This asset does not use the same global Offset as
	# survivors_tower_guardtower (-17); that value misaligned the whole stack for this .mobd.
	# Turret offset Y is higher than idle: body+turret are both positioned from MOBD attach id 0, but the
	# turret art sits too high relative to the base; nudging the turret sequence only shifts the gunner down.
	turret:
		Filename: sprites.lvl|MGuardTower.mobd
		Facings: -16
		Offset: 2,35
	idle:
		Filename: sprites.lvl|MGuardTower.mobd
		Start: 16
		Offset: 1,-14
	make0:
		Filename: sprites.lvl|MGuardTower.mobd
		Start: 17
		Offset: 1,-14
	make1:
		Filename: sprites.lvl|MGuardTower.mobd
		Start: 18
		Offset: 1,-14
	make2:
		Filename: sprites.lvl|MGuardTower.mobd
		Start: 19
		Offset: 1,-14
	damaged-idle:
		Filename: actors/evolved/towers/machinegunnest/frames.png
		Offset: 1,-14
	icon:
		Filename: actors/evolved/towers/machinegunnest/icon.png
